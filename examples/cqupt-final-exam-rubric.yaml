        - "应重点因 mid 计算、区间更新、复杂度判断错误而扣分。"

    white_box_testing_01:
      name: "五、综合题 第3问 白盒测试与路径覆盖"
      question_type: "white_box_testing"
      question_range: "五-3"
      max_score: 10
      description: "计算环路复杂度。"
      scoring_guidance: |
        本题按拆点计分，不以“最后结果碰巧等于 3”作为高分依据。
        必须同时关注节点数 N、边数 E、以及 V(G) 的计算过程。
        如果最终写出 3，但代入过程错误或公式推导错误，则最后 5 分不能给。
      scoring_rule: |
        满分 10 分，按以下规则给分：
        1. N 的取值正确，给 2 分。
        2. E 的取值正确，给 2 分。
        3. N 和 E 都正确时，可合计得到 5 分。
        4. V(G) 计算过程正确且最终结果正确，给 5 分。
        5. 如果 V(G) 计算过程不对，或者最终结果不对，则这 5 分不给。
      evidence_type: quote
      evidence_source: text
      answer_key:
        question_id: "五-3"
        reference_basis: "标准答案给出 N=6，E=7，V(G)=E-N+2=3。"
      core_points:
        - "正确识别节点数 N=6。"
        - "正确识别边数 E=7。"
        - "正确使用环路复杂度公式 V(G)=E-N+2。"
        - "代入过程正确。"
        - "最终计算结果为 3。"
      acceptable_alternatives:
        - "允许学生不逐条画图，只要 N、E 的识别和 V(G) 推导过程清楚正确。"
        - "允许使用等价正确的复杂度推导表达，但必须能对应到正确的 N、E 和 V(G) 结果。"
      full_score_conditions:
        - "N=6 正确。"
        - "E=7 正确。"
        - "V(G)=E-N+2 的代入过程正确。"
        - "最终结果为 3。"
      partial_credit_conditions:
        - "只答对 N 或只答对 E，可得对应的 2 分。"
        - "N 和 E 都答对，但未写出正确的 V(G) 计算过程，客观数据部分给分，计算部分不给分。"
        - "写出了公式，但代入或运算错误，不能拿 V(G) 计算的 5 分。"
      zero_score_conditions:
        - "N、E 都未识别正确，且 V(G) 计算过程也错误。"
        - "完全偏离白盒测试/环路复杂度主题。"
      deduction_rules:
        - "不要因为最终结果恰好写成 3 就直接给高分。"
        - "V(G) 的 5 分必须建立在计算过程正确且结果正确的前提上。"
        - "N 和 E 应分别判断；只答对一个时给对应分数。"
