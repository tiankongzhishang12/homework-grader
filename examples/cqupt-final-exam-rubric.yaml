        不要求学生必须照标准答案排版；只要 low、high、mid 推导正确，且能说明 O(log n)，就应给相应分数。
        不应把“必须逐轮写出 66 的查找过程”作为唯一高分路径；正确的通用二分查找实现与正确复杂度也应得到较多分数。
      scoring_rule: |
        满分 20 分；按以下思路评分：
        1. 正确体现二分查找核心思想、边界和 mid 比较逻辑，可获得主要过程分。
        2. 正确写出时间复杂度 O(log n)，应单独给较明显分值。
        3. 若能进一步结合题目数组，写出查找 66 的逐轮 low/high/mid 过程，可拿满分或接近满分。
