        - "边界更新逻辑基本正确。"
        - "说明二分查找时间复杂度为 O(log n)。"
        - "若能结合本题数组，写出查找 66 的具体轮次过程，可获得更高分。"
      acceptable_alternatives:
        - "允许不写完整代码，只写清楚每轮 low、high、mid 和判断过程。"
        - "允许用“对数级”“log 级别”说明复杂度，只要含义正确。"
        - "允许使用通用伪代码或通用函数形式表达二分查找，只要算法思想和复杂度正确。"
      full_score_conditions:
        - "正确写出二分查找思想和边界更新。"
        - "复杂度说明正确。"
        - "并且能结合本题数组，写出查找 66 的关键轮次过程。"
