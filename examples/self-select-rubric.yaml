rubric:
  id: self-select-login-payment-v2
  name: 用户登录与支付流程作业
  version: 2.0
  description: "用于评阅同一道作业题中的文字说明与时序图。"
  instruction: |
    题目要求：
    1. 用 500-700 字描述用户从打开网站、登录、浏览商品、下单到完成支付的主要流程。
    2. 分析该流程中的安全风险，并提出至少三条有针对性的改进措施。
    3. 提供一张时序图，清楚标注主要参与者、消息名称、方向，以及关键返回结果或状态。

    评分时必须分别检查文字答案和时序图，不得因为文字写得长就默认图合格，也不得因为画了图就补足文字中缺失的风险分析。
    如果预处理结果中的图像描述或 OCR 不完整，应基于现有证据谨慎评分，并相应降低 confidence。

  gates:
    - id: G-001
      name: 字数门禁
      description: 文字答案应控制在 500-700 字
      check_method: length
      parameters:
        min_words: 500
        max_words: 700
      on_fail: flag

    - id: G-002
      name: 时序图门禁
      description: 作业必须包含至少一张时序图证据
      check_method: image_count
      parameters:
        min_images: 1
      on_fail: flag

    - id: G-003
      name: 风险识别门禁
      description: 文字中至少体现 3 个不同安全风险点
      check_method: keyword
      parameters:
        keywords: ["暴力破解", "密码", "会话", "HTTPS", "TLS", "中间人", "金额篡改", "回调伪造", "重复支付", "幂等", "SQL 注入", "XSS", "CSRF"]
        min_count: 3
      on_fail: flag

    - id: G-004
      name: 改进措施门禁
      description: 文字中至少体现 3 条具体改进措施
      check_method: keyword
      parameters:
        keywords: ["验证码", "限制", "限流", "多因素", "MFA", "哈希", "HTTPS", "HSTS", "HttpOnly", "Secure", "SameSite", "签名", "校验", "幂等", "预编译", "转义"]
        min_count: 3
      on_fail: flag

    - id: G-005
      name: 支付回调门禁
      description: 文字或图中应提到支付回调、异步通知或订单状态更新
      check_method: keyword
      parameters:
        keywords: ["支付回调", "异步通知", "回调", "订单状态更新", "订单状态", "notify"]
        min_count: 1
      on_fail: flag

  thresholds:
    accept: 3.5
    reject: 2.0
    review: [2.0, 3.5]

  comment_guidelines:
    tone: constructive, specific
    language: zh-CN
    length_range: [120, 220]
    required_sections:
      - strengths
      - weaknesses
      - suggestions
    prohibited_patterns:
      - "作为 AI"
      - "无法评分"
      - "整体不错"

  criteria:
    text_flow:
      name: 文字流程说明
      weight: 0.35
      scale: [1, 2, 3, 4, 5]
      description: "评估文字部分是否覆盖从访问网站到支付完成的关键业务流程，且顺序清晰、表述准确。"
      scoring_guidance: |
        必须覆盖的关键步骤：访问网站、登录认证、浏览商品、购物车、结算校验、订单创建、发起支付、支付结果返回、
        支付回调/通知、订单状态更新；
        需明确角色拆分（至少区分前端/浏览器、认证服务、订单服务、支付平台或支付网关）；
        至少提到 1 个校验或异常处理点（如库存/价格校验、登录失败、支付失败）；
        若未明确拆分认证/订单/支付相关角色，最高不超过 4 分；
        若未区分同步返回与异步通知，最高不超过 4 分；
        若同步返回与异步通知混淆或顺序明显错误，应降分。
      evidence_type: quote
      anchors:
        1: "文字流程严重缺失或大部分内容与题目无关，无法说明登录与支付如何完成。"
        2: "仅覆盖片段（如登录/支付之一），缺少订单或结算等核心环节；流程断裂或顺序混乱。"
        3: "覆盖主要步骤但缺 2-3 个关键步骤，或角色拆分明显不足，前后衔接存在明显缺口；同步返回与异步通知描述不够清楚。"
        4: "覆盖几乎全部关键步骤，仅缺 0-1 项；角色拆分略粗但能区分主要服务；顺序清楚、技术表述基本正确。"
        5: "完整覆盖所有关键步骤，明确拆分认证/订单/支付相关角色，同步返回与异步通知均清晰说明，且包含至少 1 个校验或异常处理点。"

    risk_controls:
      name: 安全风险与改进措施
      weight: 0.35
      scale: [1, 2, 3, 4, 5]
      description: "评估是否识别关键安全风险，并提出与风险相匹配、可执行的改进措施。"
      scoring_guidance: |
        风险应覆盖以下类别中的多数：
        - 认证类（暴力破解、密码存储、会话管理）
        - 传输类（HTTPS/TLS、中间人）
        - 支付类（金额篡改、回调伪造、重复支付/幂等）
        - 输入类（SQL 注入、XSS）
        改进措施需与风险一一对应，避免空泛口号；至少给出三条具体措施。
        若风险覆盖不足认证/传输/支付/输入四类中的三类，最高不超过 4 分；
        若风险与措施缺乏对应关系，最高不超过 3 分。
      evidence_type: quote
      anchors:
        1: "几乎没有有效的安全分析，或只给出笼统结论，没有可执行改进措施。"
        2: "风险或措施数量不足（三条以下），或明显与风险不匹配。"
        3: "识别 ≥3 个风险并给出 ≥3 条措施，但覆盖面不全、措施偏泛，或风险与措施对应关系不清晰。"
        4: "识别 ≥4 个关键风险，覆盖至少三类风险；给出 ≥4 条较具体措施且基本对应。"
        5: "识别 ≥6 个风险，覆盖认证/传输/支付/输入四类；给出 ≥6 条具体措施并一一对应，工程可执行性强。"

    sequence_diagram:
      name: 时序图完整性与一致性
      weight: 0.30
      scale: [1, 2, 3, 4, 5]
      description: "评估时序图是否存在、是否表达关键交互、是否标注规范，并与文字说明保持一致。"
      scoring_guidance: |
        参与者最低要求：至少包含用户/前端、商城后端、支付平台；
        高分需进一步拆分认证服务或订单服务或支付回调处理模块；
        必须标注消息名称、方向、关键返回结果/状态码，并包含支付回调/通知；
        若无支付回调/通知，最高不超过 3 分；
        若参与者少于 5 个，最高不超过 4 分；
        若与文字流程明显冲突或关键阶段缺失，需降分（最高不超过 3 分）。
      evidence_type: observation
      anchors:
        1: "没有可用的时序图证据，或图与题目明显不符，无法支持评分。"
        2: "有时序图雏形，但参与者不足或消息/方向/返回结果缺失严重，难以表达完整流程。"
        3: "参与者 ≥3，但关键消息名或返回结果缺失明显，或缺少支付回调/通知，或与文字有不一致。"
        4: "参与者 ≥4，关键消息名、方向与返回结果基本齐全，覆盖登录/下单/支付/回调关键阶段，与文字基本一致。"
        5: "参与者 ≥5，消息名/方向/返回结果完整，包含异步回调与订单状态更新，与文字高度一致。"
