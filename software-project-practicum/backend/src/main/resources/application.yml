server:
  port: 8080

spring:
  application:
    name: homework-grader-backend
  datasource:
    url: jdbc:mysql://localhost:3306/homework_grader?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

grader:
  workspace-root: ${GRADER_WORKSPACE_ROOT:../workspace/practicum-batch}
  python:
    executable: ../../.venv/Scripts/python.exe
    working-directory: ..
    config-path: ${GRADER_CONFIG_PATH:grader-config.yaml}
    preprocess-script: scripts/preprocess_student_dirs.py
    grading-script: scripts/batch_score_reports.py
    export-script: scripts/export_traceability_excel.py

rubric:
  compiler:
    model: ${RUBRIC_LLM_MODEL:}
    base-url: ${RUBRIC_LLM_BASE_URL:}
    api-key: ${RUBRIC_LLM_API_KEY:}
    config-path: ${RUBRIC_LLM_CONFIG_PATH:../../grader-config.yaml}
    timeout-seconds: ${RUBRIC_LLM_TIMEOUT_SECONDS:60}
    max-retries: ${RUBRIC_LLM_MAX_RETRIES:1}
