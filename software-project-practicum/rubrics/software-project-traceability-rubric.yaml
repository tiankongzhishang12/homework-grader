rubric:
  id: software-project-traceability-rubric-v1
  name: "软件项目基础实训总结报告追踪式评分标准"
  version: 1.0
  score_mode: raw
  max_total_score: 100
  description: |
    本评分标准用于评阅《软件项目基础实训》总结报告中与需求规格说明书、
    概要设计说明书、详细设计说明书相关的内容。

    核心目标不是判断学生的设计“像不像模板”，而是检查：
    1. 学生自己在需求规格说明书中提出了哪些需求；
    2. 这些需求是否在概要设计中得到承接；
    3. 这些需求与概要设计是否在详细设计中继续落实；
    4. 前后章节是否自洽，且与分工说明能够对应。

    评分时必须坚持“前后追踪式”原则，严禁脱离该同学自己的文档内容进行脑补式评分。

  instruction: |
    你正在评阅《软件项目基础实训》总结报告。请严格按“需求 -> 概要设计 -> 详细设计”的追踪链路评分。

    【总流程】
    第一步：先完整阅读该同学自己的需求规格说明书，抽取“需求清单”。
    需求清单至少应包含：
    - 主要参与者/角色
    - 核心用例/功能
    - 关键业务流程
    - 明确写出的约束条件（如权限、流程限制、性能、扩展、展示约束等）
    - 主要业务对象/数据对象（如果需求中已经出现）

    第二步：用第一步抽取出的需求清单，检查概要设计。
    必须判断每个核心需求在概要设计中属于以下哪种情况：
    - 已覆盖：有明确对应的模块、架构说明、交互/时序设计或其他概要设计内容
    - 弱覆盖：有提及但不充分、不清晰、无法支撑实现
    - 错误覆盖：与需求冲突、明显偏题、对象或流程对不上
    - 未覆盖：需求中明确存在，但概要设计中没有对应

    第三步：再用“需求清单 + 概要设计中的关键设计项”检查详细设计。
    必须判断每个核心需求和关键设计项在详细设计中是否真正落地到：
    - 界面/页面设计
    - 核心业务类/类图/职责设计
    - 接口设计
    - 数据库设计
    - 方法流程/复杂逻辑说明

    【评分原则】
    1. 不以“是否使用模板术语”代替真实一致性判断。
    2. 不因篇幅长、图多、截图多、术语高级而自动高分。
    3. 图和文字必须互相支撑，不能图一套、文一套。
    4. 若需求中声明了某个核心用例/功能，而概要设计或详细设计没有对应实现设计，应扣分。
    5. 若设计出现了需求中未提及的大量核心功能，且未说明扩展原因，应视为偏题或一致性不足。
    6. 若只是名称不同但语义一致，应视为有效对应，不得机械扣分。
    7. 若需求本身写得较弱，应在需求质量相关维度扣分；后续设计维度仍按“是否落实现有需求”评分，避免双重过罚。
    8. 当证据不足时，应明确说明证据不足，并降低 confidence；不要凭常识补全学生未写出的内容。

    【证据要求】
    对每个评分维度，必须先给出来自学生文档的证据，再给出推理，再给出分数。
    优先引用或概括以下证据：
    - 需求规格说明书中的用例图、涉众分析、用例规约、活动图/系统用例图、需求描述
    - 概要设计中的项目用例图、功能说明、系统架构设计、用例时序图
    - 详细设计中的界面原型说明、核心业务类说明、类图、接口设计、数据库设计、方法流程图
    - 分工说明中的个人负责内容

    【对评语的额外要求】
    评语应重点指出：
    - 哪些需求被设计承接得比较好
    - 哪些需求在概要设计或详细设计中丢失了
    - 哪些地方前后不一致
    - 学生下一步应该补哪些设计内容

  gates:
    - id: G-001
      name: 需求章节存在性
      description: 报告中应出现需求规格说明书相关内容
      check_method: keyword
      parameters:
        keywords: ["需求规格说明书", "用例图", "用例规约", "涉众分析"]
        min_count: 1
      on_fail: flag

    - id: G-002
      name: 概要设计章节存在性
      description: 报告中应出现概要设计说明书相关内容
      check_method: keyword
      parameters:
        keywords: ["概要设计", "系统架构设计", "时序图", "项目用例图"]
        min_count: 1
      on_fail: flag

    - id: G-003
      name: 详细设计章节存在性
      description: 报告中应出现详细设计说明书相关内容
      check_method: keyword
      parameters:
        keywords: ["详细设计", "类图", "接口设计", "数据库设计"]
        min_count: 1
      on_fail: flag

    - id: G-004
      name: 分工说明提示
      description: 报告中若包含分工说明，可辅助判断个人贡献与设计内容是否对应
      check_method: keyword
      parameters:
        keywords: ["分工说明", "本人负责", "负责模块", "负责功能"]
        min_count: 1
      on_fail: warn

  thresholds:
    accept: 85
    reject: 60
    review: [60, 85]

  comment_guidelines:
    tone: "constructive, specific, traceability-focused"
    language: "zh-CN"
    length_range: [160, 320]
    required_sections:
      - strengths
      - weaknesses
      - suggestions
    prohibited_patterns:
      - "作为 AI"
      - "整体不错"
      - "无法判断"
      - "写得挺好"

  criteria:
    req_scope_and_usecases:
      name: "需求范围与核心用例清晰度"
      max_score: 8
      description: "评估需求规格说明书是否明确系统目标、范围、主要参与者及核心用例，为后续设计提供清晰基础。"
      scoring_guidance: |
        必须先从需求规格说明书中提取：系统目标、边界、主要角色、核心用例。
        如果只能看到空泛背景介绍，缺乏明确可追踪的用例/功能，不能给高分。
        若系统做什么、不做什么、谁使用、做哪些事都比较模糊，应明显扣分。
      scoring_rule: |
        满分 8 分。重点看需求是否足以成为后续概要设计和详细设计的起点。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "系统目标、范围、主要参与者和核心用例均较明确。"
        - "可以据此抽取出较稳定的需求清单。"
        - "后续设计能够找到明确的需求依据。"
      partial_credit_conditions:
        - "写明了部分功能和角色，但范围边界不清或核心用例不完整。"
        - "存在需求基础，但抽取出来的需求清单较零散。"
      zero_score_conditions:
        - "只有泛泛项目介绍，几乎没有明确角色、用例或需求边界。"
        - "需求内容不足以支撑后续设计追踪。"
      deduction_rules:
        - "不能因篇幅长或术语多而高分。"
        - "如果需求目标与用例之间明显脱节，应扣分。"

    req_usecase_spec_quality:
      name: "用例图、涉众分析与用例规约质量"
      max_score: 9
      description: "评估需求文档中用例图、涉众分析和各主要用例说明是否完整、具体、可被后续设计承接。"
      scoring_guidance: |
        模板要求展示用例图，并针对每个参与者进行涉众分析，同时对主要用例做说明或规约。
        评分时要看：参与者是否完整、用例是否具体、是否对关键用例做了逐项说明，而不是只看是否插入图片。
      scoring_rule: |
        满分 9 分。缺图、缺涉众、缺用例说明都应分项扣分。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "有较完整的用例图，覆盖主要参与者和核心用例。"
        - "对主要参与者有较清晰的涉众分析。"
        - "对主要用例有较具体的说明或规约，可支撑后续设计展开。"
      partial_credit_conditions:
        - "有用例图但参与者或核心用例覆盖不全。"
        - "有部分用例说明，但不够具体，难以直接支撑后续设计。"
        - "涉众分析存在，但较空泛或未覆盖主要角色。"
      zero_score_conditions:
        - "没有有效的用例图与主要用例说明。"
        - "只有标题或模板痕迹，缺乏实际需求内容。"
      deduction_rules:
        - "不能因为贴了图就默认内容有效。"
        - "若图中用例与文字说明明显对不上，应扣分。"

    req_process_expression:
      name: "需求流程表达与可设计性"
      max_score: 8
      description: "评估需求文档是否通过活动图、系统用例图或文字流程充分表达关键业务流程，并具备可设计性。"
      scoring_guidance: |
        重点看关键业务流程是否能被读出来：前置条件、基本事件流、结果、约束是否明确。
        这项不是看流程图是否好看，而是看后续概要设计是否能据此做架构和交互设计。
      scoring_rule: |
        满分 8 分。若流程表达不足，后续设计无法追踪，应明显扣分。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "关键业务流程表达较完整，有基本事件流或等价描述。"
        - "能看出关键交互、先后关系和主要约束。"
        - "需求具备较好的可设计性，可支持架构、交互、类、接口和数据库设计。"
      partial_credit_conditions:
        - "流程有基本描述，但细节不足，约束不明确。"
        - "部分核心流程可追踪，部分流程较空泛。"
      zero_score_conditions:
        - "没有有效的关键流程表达。"
        - "需求只列功能点，几乎无法支撑后续设计。"
      deduction_rules:
        - "如果流程表达与前面的用例明显冲突，应扣分。"

    hld_requirement_coverage:
      name: "概要设计对需求的覆盖程度"
      max_score: 8
      description: "评估概要设计是否覆盖需求规格说明书中的主要功能、用例、角色和流程。"
      scoring_guidance: |
        必须先列出需求清单，再逐项检查概要设计中的模块、子系统、功能说明、项目用例图是否对应。
        对每个核心需求要判断是已覆盖、弱覆盖、错误覆盖还是未覆盖。
        若需求中的核心功能在概要设计中找不到对应，不得给高分。
      scoring_rule: |
        满分 8 分。覆盖越完整、映射越清楚，得分越高。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "大多数核心需求均能在概要设计中找到明确对应。"
        - "需求到模块/子系统/功能说明的映射较清楚。"
        - "基本不存在明显遗漏的核心需求。"
      partial_credit_conditions:
        - "概要设计覆盖了部分核心需求，但仍有弱覆盖或遗漏。"
        - "存在映射关系，但较零散或不够明确。"
      zero_score_conditions:
        - "概要设计与需求基本脱节。"
        - "需求中的主要功能在概要设计中大面积未体现。"
      deduction_rules:
        - "若概要设计主要围绕需求中未提及的内容展开，应扣分。"

    hld_architecture_fitness:
      name: "系统架构设计对需求的适配性"
      max_score: 6
      description: "评估概要设计中的系统架构、分层或模块划分能否支撑需求中的主要业务。"
      scoring_guidance: |
        模板要求概要设计至少细分到 BCE/MVC 或其他明确架构。
        评分重点不是架构名词是否高级，而是该架构是否能够承接需求中的角色、用例和流程。
      scoring_rule: |
        满分 6 分。结构清晰且与需求匹配度高者得高分。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "有较明确的系统架构或分层设计。"
        - "架构划分能够解释需求中的主要业务如何被组织和承载。"
        - "有图有文字，且图文一致。"
      partial_credit_conditions:
        - "有架构图或分层说明，但较粗略，和需求对应关系不够充分。"
        - "能看出大致结构，但不足以支撑后续详细设计。"
      zero_score_conditions:
        - "缺少有效的架构设计说明。"
        - "架构与需求明显不匹配或仅有模板化空话。"
      deduction_rules:
        - "不能因引用 MVC、三层、微服务等名词而自动高分。"

    hld_usecase_sequence_alignment:
      name: "关键用例时序/交互设计与需求一致性"
      max_score: 8
      description: "评估概要设计中关键用例的时序图或交互设计是否真正来源于前文需求，并正确表达主要协作过程。"
      scoring_guidance: |
        模板要求对用例进行时序图建模，并说明实现思路。
        评分时必须检查关键用例是否真的选自需求规格说明书中的核心用例，而不是另外写了一套流程。
        同时检查主要参与对象、消息顺序、关键交互是否和需求中的基本事件流一致。
      scoring_rule: |
        满分 8 分。关键用例越贴合需求、交互表达越清楚，得分越高。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "选择了需求中的关键用例进行时序/交互设计。"
        - "交互对象、顺序和关键步骤与需求流程基本一致。"
        - "有文字解释该交互的实现思路。"
      partial_credit_conditions:
        - "有时序图或交互说明，但与需求的对应关系不够清楚。"
        - "只覆盖了部分关键步骤，或交互过程较粗略。"
      zero_score_conditions:
        - "没有有效的关键用例时序/交互设计。"
        - "时序/交互设计与需求中的关键用例明显不对应。"
      deduction_rules:
        - "不能只因有时序图图片就给高分。"
        - "若交互流程与需求事件流冲突，应扣分。"

    lld_ui_alignment:
      name: "界面类详细设计与需求匹配度"
      max_score: 6
      description: "评估界面原型、页面说明及展示约束是否支持需求中的主要用户任务和业务流程。"
      scoring_guidance: |
        模板要求展示界面原型并做说明。
        评分时要看界面是否围绕需求中的用户角色、主要任务和流程来设计，而不是只贴运行截图。
      scoring_rule: |
        满分 6 分。页面越能支撑需求中的用户任务，得分越高。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "主要页面/界面与需求中的核心用户任务对应较清楚。"
        - "有必要的页面说明、约束或展示逻辑说明。"
        - "界面设计能支撑关键业务流程。"
      partial_credit_conditions:
        - "有界面展示，但说明不足，和需求流程的对应关系较弱。"
        - "只覆盖了部分核心任务页面。"
      zero_score_conditions:
        - "几乎没有有效的界面类详细设计。"
        - "界面内容与需求中的主要任务明显不匹配。"
      deduction_rules:
        - "单纯贴截图不能视为高质量详细设计。"

    lld_class_alignment:
      name: "核心业务类设计与用例匹配度"
      max_score: 8
      description: "评估核心业务类、类图、类职责及方法说明是否围绕需求中的主要用例和概要设计中的模块展开。"
      scoring_guidance: |
        模板要求对核心业务类进行详细设计，并对类图做总体描述。
        评分时要检查：类是否能承接需求中的业务对象和用例；类职责是否与概要设计中的模块边界基本一致。
      scoring_rule: |
        满分 8 分。类设计越贴合核心用例与模块职责，得分越高。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "有较清晰的核心类/类图设计。"
        - "类职责与需求中的核心业务、用例和概要模块基本匹配。"
        - "可以看出主要类之间如何协作支撑需求。"
      partial_credit_conditions:
        - "有类图或类说明，但与需求和概要设计的对应关系不够充分。"
        - "类职责较模糊，或只覆盖部分核心用例。"
      zero_score_conditions:
        - "没有有效的核心业务类设计。"
        - "类设计与需求/概要设计明显脱节。"
      deduction_rules:
        - "若前面写 MVC/BCE/分层，后面类职责却完全混乱，应扣分。"

    lld_api_alignment:
      name: "接口设计与用例/模块匹配度"
      max_score: 7
      description: "评估接口设计是否能支撑需求中的关键业务场景，并与概要设计中的模块和交互逻辑保持一致。"
      scoring_guidance: |
        模板要求做核心接口设计。
        评分时不要看接口数量，而要看接口是否真正对应需求中的主要用例和业务动作，参数与返回是否基本清楚。
      scoring_rule: |
        满分 7 分。接口与需求场景、概要模块、业务流程越匹配，得分越高。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "关键业务场景有对应接口设计。"
        - "接口名称、作用、主要参数/返回说明较清楚。"
        - "接口设计与概要设计中的模块和交互逻辑基本一致。"
      partial_credit_conditions:
        - "有接口设计，但覆盖不全，或与关键场景关系不够清楚。"
        - "参数或返回说明较粗略。"
      zero_score_conditions:
        - "几乎没有有效接口设计。"
        - "接口设计与需求中的关键业务场景明显对不上。"
      deduction_rules:
        - "接口多不等于得分高，关键看是否支撑核心场景。"

    lld_database_alignment:
      name: "数据库设计与业务对象匹配度"
      max_score: 7
      description: "评估数据库设计是否能够支撑需求中的核心业务对象、关系和关键流程，并与概要设计保持一致。"
      scoring_guidance: |
        模板明确指出数据库表主要来源于概要设计中的 ER 图。
        评分时要看表、字段、关系是否能承接需求中的核心实体和业务关系，而不是只看有没有表格。
      scoring_rule: |
        满分 7 分。业务对象、关系、表设计越吻合，得分越高。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "数据库设计能较好覆盖需求中的核心业务对象和关系。"
        - "与概要设计中的实体/ER 思路基本一致。"
        - "表结构说明具备基本可用性。"
      partial_credit_conditions:
        - "有数据库设计，但核心对象覆盖不全，或关系表达较弱。"
        - "和概要设计之间存在部分脱节。"
      zero_score_conditions:
        - "缺少有效数据库设计。"
        - "数据库表与前文业务对象明显对不上。"
      deduction_rules:
        - "单纯罗列表名不能视为高分。"

    lld_method_flow_feasibility:
      name: "方法流程/复杂逻辑说明的可实现性"
      max_score: 4
      description: "评估详细设计中对核心方法、关键流程或复杂逻辑的说明是否达到基本可实现程度。"
      scoring_guidance: |
        模板要求展示方法流程图，并说明参数接口及实现流程；复杂算法还应补充实现相关介绍。
        评分时关注是否能读出“具体怎么做”，而不是只有方法名或空泛说明。
      scoring_rule: |
        满分 4 分。能解释关键方法流程和实现思路者得高分。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "对关键方法或复杂流程有较清晰的流程说明。"
        - "必要时说明了参数、步骤或算法实现思路。"
        - "内容达到基本可实现程度。"
      partial_credit_conditions:
        - "有方法流程或逻辑说明，但较粗略。"
        - "能看出方向，但还不足以很好指导实现。"
      zero_score_conditions:
        - "几乎没有有效的方法流程或复杂逻辑说明。"
        - "只列方法名，无法看出如何实现。"
      deduction_rules:
        - "不能因为画了流程图就默认可实现。"

    design_consistency_traceability:
      name: "需求-概要-详细追踪一致性"
      max_score: 13
      description: "综合评估需求、概要设计、详细设计三者之间的追踪链路是否清楚、前后是否自洽。"
      scoring_guidance: |
        这是全局追踪维度。
        必须综合判断：
        - 需求中的核心用例/功能是否能在概要设计中找到承接
        - 概要设计中的关键模块/交互是否能在详细设计中找到落地
        - 术语、模块名、类名、接口名、表名是否前后一致
        若存在“需求一套、概要一套、详细一套”的情况，应明显扣分。
      scoring_rule: |
        满分 13 分。追踪链路越完整、前后越自洽，得分越高。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "能较清楚建立需求 -> 概要设计 -> 详细设计的追踪关系。"
        - "核心术语、对象和结构前后一致。"
        - "几乎不存在明显的章节冲突或断裂。"
      partial_credit_conditions:
        - "总体上存在追踪关系，但局部有脱节或命名不一致。"
        - "部分核心内容能追踪，部分追踪链路较弱。"
      zero_score_conditions:
        - "前后章节大面积脱节。"
        - "无法建立清晰的需求到设计追踪链路。"
      deduction_rules:
        - "若图文不一致、模块名称混乱、类表接口对应关系错乱，应扣分。"

    individual_contribution_alignment:
      name: "分工说明与个人设计内容对应性"
      max_score: 6
      description: "评估分工说明中的个人负责内容是否与该同学提交的设计内容相互印证，并体现个人贡献痕迹。"
      scoring_guidance: |
        若文档中有分工说明，应将其作为辅助证据使用。
        重点看该同学报告中的设计内容是否与自己负责的模块、功能、页面、接口或数据库部分对应。
        若没有分工说明，不必直接判 0 分，但应基于现有证据谨慎给分。
      scoring_rule: |
        满分 6 分。分工说明与设计内容对应越清楚，得分越高。
      evidence_type: quote
      evidence_source: text
      full_score_conditions:
        - "有分工说明，且个人负责内容与文档中的设计内容对应较清楚。"
        - "能看出该同学在自己负责部分的设计痕迹。"
      partial_credit_conditions:
        - "有分工说明，但与设计内容对应关系较弱。"
        - "没有明确分工说明，但从文档中仍能看到一定个人负责内容线索。"
      zero_score_conditions:
        - "分工说明与设计内容明显对不上。"
        - "几乎没有可用于判断个人贡献对应性的证据。"
      deduction_rules:
        - "不能仅因出现“本人负责”字样就高分，关键看是否与设计内容相互印证。"
